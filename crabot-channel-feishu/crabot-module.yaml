module_id: channel-feishu
name: Feishu (飞书 / Lark)
version: 0.1.0
module_type: channel
description: 飞书 / Lark Channel 模块，长连接事件订阅，无需公网回调

protocol_version: "0.1.0"

runtime:
  type: nodejs
  version: ">=20.0.0"

install: corepack pnpm install
build: corepack pnpm run build
entry: dist/main.js

# 交互式配置入口（base-protocol §10）：用户在 Admin Web 选这种入口替代手动填表
onboarding_methods:
  - id: device_code_oauth
    name: 扫码授权
    description: 用飞书 / Lark App 扫一扫即可创建并授权 Bot，无需手动复制 App ID / Secret
    type: device_code
    handler: dist/onboard.js

config_schema:
  type: object
  required:
    - FEISHU_APP_ID
    - FEISHU_APP_SECRET
  # 扩展约定（Admin Web 用，不影响 channel 模块本身）：
  #   x-runtime-path: 运行时 get_config / update_config RPC 里嵌套对象的路径
  #     （env 变量 ↔ 运行时嵌套对象的双向映射）
  #   readOnly: true → Admin Web 把字段渲染为只读
  #   schema 里没列出的运行时字段（如 platform / crab_platform_user_id）默认不在
  #   Admin Web 配置面板渲染——用户压根不应看到 / 编辑。
  properties:
    FEISHU_APP_ID:
      type: string
      title: 飞书 App ID
      description: 扫码时自动填入，无需手动修改
      readOnly: true
      x-runtime-path: credentials.app_id
    FEISHU_APP_SECRET:
      type: string
      title: 飞书 App Secret
      description: 扫码时自动填入；如需重置请重新扫码授权
      format: password
      readOnly: true
      x-runtime-path: credentials.app_secret
    FEISHU_DOMAIN:
      type: string
      title: 接入域
      description: feishu = 国内飞书；lark = 国际版 Lark
      enum: ["feishu", "lark"]
      enum_titles: ["国内飞书 (feishu.cn)", "国际版 Lark (larksuite.com)"]
      default: "feishu"
      x-runtime-path: credentials.domain
    FEISHU_OWNER_OPEN_ID:
      type: string
      title: 主人 open_id
      description: 扫码时绑定的飞书账号 open_id，跨渠道复用主人身份
      readOnly: true
      x-runtime-path: credentials.owner_open_id
    FEISHU_ONLY_RESPOND_TO_MENTIONS:
      type: string
      title: 群聊仅响应 @ Crabot
      description: 启用时群聊里只有 @ Crabot 的消息才会触发事件
      enum: ["true", "false"]
      enum_titles: ["是", "否"]
      default: "true"
      x-runtime-path: group.only_respond_to_mentions
    FEISHU_MARKDOWN_FORMAT:
      type: string
      title: Markdown 渲染
      description: bot 给飞书发文本时是否按 Markdown 渲染（启用时改用 interactive 卡片 + markdown 元素）；auto 仅在检测到 markdown 标记时启用
      enum: ["auto", "on", "off"]
      enum_titles: ["自动", "启用", "关闭"]
      default: "auto"
      x-runtime-path: markdown_format

author: Crabot Team
license: MIT
keywords:
  - feishu
  - lark
  - channel
  - messaging
